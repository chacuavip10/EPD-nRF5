<!doctype html>
<html lang="en">

<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>E-ink Calendar</title>
	<link rel="shortcut icon" type="image/png" href="favicon.png">
	<link rel="stylesheet" href="css/main.css?v=20251109">
</head>

<body>
	<div class="main">
		<h3>E-ink Calendar</h3>
		<fieldset>
			<legend>Connect via Bluetooth</legend>
			<div class="flex-container">
				<div class="flex-group">
					<button id="connectbutton" type="button" class="primary" onclick="preConnect()">Connect</button>
					<button id="reconnectbutton" type="button" class="secondary" onclick="reConnect()">Re-connect</button>
					<button type="button" class="secondary" onclick="clearLog()">Clear log</button>
				</div>
				<div class="flex-group right debug">
					<label for="epddriver">Driver</label>
					<select id="epddriver" onchange="updateDitcherOptions()">
						<option value="01" data-color="blackWhiteColor" data-size="4.2_400_300">4.2 inch (Black & White, UC8176)</option>
						<option value="03" data-color="threeColor" data-size="4.2_400_300">4.2 inch (3-colors, UC8176)</option>
						<option value="04" data-color="blackWhiteColor" data-size="4.2_400_300">4.2 inch (Black & White, SSD1619)</option>
						<option value="02" data-color="threeColor" data-size="4.2_400_300">4.2 inch (3-colors, SSD1619)</option>
						<option value="05" data-color="fourColor" data-size="4.2_400_300">4.2 inch (4-colors, JD79668)</option>
						<option value="0d" data-color="fourColor" data-size="5.83_648_480">5.83 inch (4-colors, JD79665)</option>
						<option value="06" data-color="blackWhiteColor" data-size="7.5_800_480">7.5 inch  (Black & White, UC8179)</option>
						<option value="07" data-color="threeColor" data-size="7.5_800_480">7.5 inch  (3-colors, UC8179)</option>
						<option value="0c" data-color="fourColor" data-size="7.5_800_480">7.5 inch  (4-colors, JD79665)</option>
						<option value="08" data-color="blackWhiteColor" data-size="7.5_640_384">7.5 inch low-res (Black & White, UC8159)</option>
						<option value="09" data-color="threeColor" data-size="7.5_640_384">7.5 inch low-res (3-colors, UC8159)</option>
						<option value="0a" data-color="blackWhiteColor" data-size="7.5_880_528">7.5 inch HD (Black & White, SSD1677)</option>
						<option value="0b" data-color="threeColor" data-size="7.5_880_528">7.5 inch HD (3-colors, SSD1677)</option>
					</select>
				</div>
				<div class="flex-group debug">
					<label for="epdpins">Pins</label>
					<input id="epdpins" type="text" value="">
					<button id="setDriverbutton" type="button" class="primary" onclick="setDriver()">Set value</button>
				</div>
			</div>
			<div class="log-container" id="log"></div>
		</fieldset>
		<fieldset>
			<legend>Setup</legend>
			<div class="flex-container">
				<div class="flex-group">
					<button id="calendarmodebutton" type="button" class="primary" onclick="syncTime(1)">Calendar mode</button>
					<button id="clockmodebutton" type="button" class="primary" onclick="syncTime(2)">Clock mode</button>
					<button id="clearscreenbutton" type="button" class="secondary" onclick="clearScreen()">Clear screen</button>
				</div>
				<div class="flex-group right debug">
					<input type="text" id="cmdTXT" value="">
					<button id="sendcmdbutton" type="button" class="primary" onclick="sendcmd()">Send command</button>
				</div>
			</div>
		</fieldset>
		<fieldset>
			<legend>Image transfer</legend>
			<div class="flex-container">
				<input type="file" id="imageFile" accept=".png,.jpg,.bmp,.webp,.jpeg" onchange="updateImage()">
			</div>
			<div class="flex-container options">
				<div class="flex-group debug">
					<label for="canvasSize">Canvas size:</label>
					<select id="canvasSize" onchange="updateCanvasSize()">
						<option value="1.54_152_152">1.54 (152x152)</option>
						<option value="1.54_200_200">1.54 (200x200)</option>
						<option value="2.13_104_212">2.13 (104x212)</option>
						<option value="2.13_122_250">2.13 (122x250)</option>
						<option value="2.66_152_296">2.66 (152x296)</option>
						<option value="2.66_184_360">2.66 (184x360)</option>
						<option value="2.9_128_296">2.9 (128x296)</option>
						<option value="2.9_168_384">2.9 (168x384)</option>
						<option value="3.5_184_384">3.5 (184x384)</option>
						<option value="3.5_360_600">3.5 (360x600)</option>
						<option value="3.7_240_416">3.7 (240x416)</option>
						<option value="3.7_280_480">3.7 (280x480)</option>
						<option value="3.97_800_480">3.97 (800x480)</option>
						<option value="3.98_768_552">3.98 (768x552)</option>
						<option value="4.2_400_300" selected>4.2 (400x300)</option>
						<option value="5.79_792_272">5.79 (792x272)</option>
						<option value="5.83_600_448">5.83 (600x448)</option>
						<option value="5.83_648_480">5.83 (648x480)</option>
						<option value="7.5_640_384">7.5 (640x384)</option>
						<option value="7.5_800_480">7.5 (800x480)</option>
						<option value="7.5_880_528">7.5 (880x528)</option>
						<option value="10.2_960_640">10.2 (960x640)</option>
						<option value="10.85_1360_480">10.85 (1360x480)</option>
						<option value="11.6_960_640">11.6 (960x640)</option>
						<option value="4.0E6_600_400">4.0E6 (600x400)</option>
						<option value="7.3E6_800_480">7.3E6 (800x480)</option>
					</select>
				</div>
				<div class="flex-group debug">
					<label for="ditherMode">Colors mode:</label>
					<select id="ditherMode" onchange="applyDither()">
						<option value="blackWhiteColor">2-colors(Black & White)</option>
						<option value="threeColor">3-colors (Black, White, Red)</option>
						<option value="fourColor">3-colors(Black, White, Red, Yellow)</option>
						<option value="sixColor">6-colors (Black, White, Red, Yellow, Blue, Green)</option>
					</select>
				</div>
				<div class="flex-group">
					<label for="ditherAlg">Dithering algorithm:</label>
					<select id="ditherAlg" onchange="applyDither()">
						<option value="floydSteinberg">Floyd-Steinberg</option>
						<option value="atkinson">Atkinson</option>
						<option value="bayer">Bayer</option>
						<option value="stucki">Stucki</option>
						<option value="jarvis">Jarvis-Judice-Ninke</option>
						<option value="none">None</option>
					</select>
				</div>
				<div class="flex-group">
					<label for="ditherStrength">Jitter:</label>
					<input type="range" min="0" max="5" step="0.1" value="1.0" id="ditherStrength">
					<label id="ditherStrengthValue">1.0</label>
				</div>
				<div class="flex-group">
					<label for="ditherContrast">Contrast:</label>
					<input type="range" min="0.5" max="2" step="0.1" value="1.2" id="ditherContrast">
					<label id="ditherContrastValue">1.2</label>
				</div>
			</div>
			<div class="flex-container options">
				<div class="flex-group debug">
					<label for="mtusize">MTU:</label>
					<input type="number" id="mtusize" value="20" min="0" max="255">
					<label for="interleavedcount">Interleaved count:</label>
					<input type="number" id="interleavedcount" value="50" min="0" max="500">
				</div>
			</div>
			<div class="status-bar"><b>State：</b><span id="status"></span></div>
			<div class="flex-container">
				<div class="flex-group">
					<button type="button" class="secondary debug" onclick="rotateCanvas()">Rotate canvas</button>
					<button type="button" class="secondary" onclick="clearCanvas()">Clear canvas</button>
					<button type="button" class="secondary debug" onclick="downloadDataArray()">Download data array</button>
					<button id="sendimgbutton" type="button" class="primary" onclick="sendimg()">Send picture</button>
				</div>
			</div>
			<div class="canvas-container">
				<div class="canvas-title"></div>
				<canvas id="canvas" width="400" height="300"></canvas>
				<div class="flex-container canvas-tools">
					<div class="flex-group tool-buttons">
						<button id="brush-mode" title="Brush mode" class="tool-button">✏️</button>
						<button id="eraser-mode" title="Eraser mode" class="tool-button">🧽</button>
						<button id="text-mode" title="Text mode" class="tool-button">T</button>
						<button id="undo-btn" title="Undo (Ctrl+Z)" class="tool-button hide">↶</button>
						<button id="redo-btn" title="Redo (Ctrl+Y)" class="tool-button hide">↷</button>
					</div>
				</div>
				<div class="flex-container canvas-tools">
					<div class="flex-group brush-tools">
						<label for="brush-color">Color:</label>
						<select id="brush-color">
							<option value="#000000">black</option>
							<option value="#FF0000">red</option>
							<option value="#FFFF00">yellow</option>
							<option value="#00FF00">green</option>
							<option value="#0000FF">blue</option>
							<option value="#FFFFFF">white</option>
						</select>
						<label for="brush-size">Size:</label>
						<input type="number" id="brush-size" value="2" min="1" max="100">
					</div>
				</div>
				<div class="flex-container canvas-tools">
					<div class="flex-group text-tools">
						<label for="font-family">Font:</label>
						<select id="font-family">
							<option value="Arial">Arial</option>
							<option value="sans-serif">Sans-serif</option>
							<option value="monospace">Monospace</option>
							<option value="SimSun">SimSun</option>
							<option value="SimHei">SimHei</option>
							<option value="Microsoft Yahei">Microsoft Yahei</option>
							<option value="Microsoft JhengHei">Microsoft JhengHei</option>
							<option value="KaiTi">KaiTi</option>
							<option value="NSimSun">NSimSun</option>
							<option value="FangSong">FangSong</option>
							<option value="YouYuan">YouYuan</option>
							<option value="LiSu">LiSu</option>
							<option value="STHeiti">STHeiti</option>
							<option value="STXihei">STXihei</option>
							<option value="STKaiti">STKaiti</option>
							<option value="STSong">STSong</option>
							<option value="STFangsong">STFangsong</option>
							<option value="STZhongsong">STZhongsong</option>
							<option value="STHupo">STHupo</option>
							<option value="STXinwei">STXinwei</option>
							<option value="STLiti">STLiti</option>
							<option value="STXingkai">STXingkai</option>
							<option value="FZShuTi">FZShuTi</option>
							<option value="FZYaoti">FZYaoti</option>
							<option value="PingFang SC">PingFang SC</option>
							<option value="Source Han Sans CN">Source Han Sans CN</option>
							<option value="Source Han Serif SC">Source Han Serif SC</option>
							<option value="WenQuanYi Micro Hei">WenQuanYi Micro Hei</option>
							</optgroup>
						</select>
						<label for="font-size">Font size:</label>
						<input type="number" id="font-size" value="16" min="1" max="100">
					</div>
					<div class="flex-group text-tools">
						<input type="text" id="text-input" placeholder="Enter text" style="width:150px">
						<button id="text-bold" title="Bold">B</button>
						<button id="text-italic" title="Itatlic">I</button>
						<button id="add-text-btn" class="primary">Add text</button>
					</div>
					<div class="flex-group crop-tools">
						<button id="crop-zoom-in" title="Zoom in" class="secondary">+</button>
						<button id="crop-zoom-out" title="Zoom out" class="secondary">-</button>
						<button id="crop-move-left" title="Move left">⇦</button>
						<button id="crop-move-up" title="Move up">⇧</button>
						<button id="crop-move-down" title="Move down">⇩</button>
						<button id="crop-move-right" title="Move right">⇨</button>
						<button class="primary" onclick="applyDither()">Finish</button>
					</div>
				</div>
			</div>
		</fieldset>
		<div class="footer">
			<span class="copy">&copy; 2025 tsl0922.</span>
			<span class="links">
				<a href="https://github.com/chacuavip10/EPD-nRF5">Github</a>
				<a href="https://qm.qq.com/q/SckzhfDxuu" onclick="return confirm('This group is for technical exchange among the authors of this open-source firmware. If you purchased the finished product, please contact the seller for after-sales service!')">Discussion Group</a>
				<a href="?debug=true" id="debug-toggle">Debug mode</a>
			</span>
		</div>
	</div>
	<script type="text/javascript" src="js/dithering.js?v=20251109"></script>
	<script type="text/javascript" src="js/paint.js?v=20251109"></script>
	<script type="text/javascript" src="js/crop.js?v=20251109"></script>
	<script type="text/javascript" src="js/main.js?v=20251109"></script>

</body>

</html>
