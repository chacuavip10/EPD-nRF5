<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>4.2 E-ink</title>
	<link rel="stylesheet" href="css/main.css?v=20250412">
</head>

<body>
    <div class="main">
        <h3>4.2 E-ink</h3>
        <fieldset>
            <legend>Connect via Bluetooth</legend>
            <div class="flex-container">
                <div class="flex-group">
                    <button id="connectbutton" type="button" class="primary" onclick="preConnect()">Connect</button>
                    <button id="reconnectbutton" type="button" class="secondary" onclick="reConnect()">Re-connect</button>
					<button type="button" class="secondary" onclick="clearLog()">Clear log</button>
                </div>
				<div class="flex-group debug">
					<label for="epddriver">Driver</label>
					<select id="epddriver" onchange="filterDitheringOptions()">
						<option value="01">UC8176 (Black & White)</option>
						<option value="03">UC8176 (3-colors)</option>
						<option value="05">UC8276 (3-colors)</option>
						<option value="04">SSD1619 (Black & White)</option>
						<option value="02">SSD1619 (3-colors)</option>
						<option value="04">SSD1683 (Black & White)</option>
						<option value="02">SSD1683 (3-colors)</option>
					</select>	
				</div>
				<div class="flex-group debug">
					<label for="epdpins">Pins</label>
					<input id="epdpins" type="text" value="">
					<button id="setDriverbutton" type="button" class="primary" onclick="setDriver()">Confirm</button>
				</div>
                <div class="flex-group">
                    <button id="calendarmodebutton" type="button" class="primary" onclick="syncTime(1)">Calendar mode</button>
                    <button id="clockmodebutton" type="button" class="primary" onclick="syncTime(2)">Clock mode</button>
					<button id="clearscreenbutton" type="button" class="secondary" onclick="clearScreen()">Clear screen</button>
                </div>
                <div class="flex-group debug">
                    <input type="text" id="cmdTXT" value="">
                    <button id="sendcmdbutton" type="button" class="primary" onclick="sendcmd()">Send command</button>
                </div>
            </div>
			<div id="log"></div>
        </fieldset>

		<fieldset>
        	<legend>Image transfer</legend>
			<div class="flex-container">
				<input type="file" id="image_file" onchange="update_image()" accept=".png,.jpg,.bmp,.webp,.jpeg">
			</div>
			<div class="flex-container">
				<div class="flex-group">
					<label for="dithering">Dithering mode</label>
					<select id="dithering" title="Dithering mode" onchange="update_image()">
						<optgroup data-driver="01|04" label="Black & White">
							<option value="none">None</option>
							<option value="bayer">bayer</option>
							<option value="floydsteinberg">floydsteinberg</option>
							<option value="Atkinson">Atkinson</option>
						</optgroup>
						<optgroup id="dithering-bwr" data-driver="02|03|05" label="3-colors">
							<option value="bwr_floydsteinberg">floydsteinberg</option>
							<option value="bwr_Atkinson">Atkinson</option>
						</optgroup>
					</select>
				</div>
				<div class="flex-group">
					<label for="threshold">Threshold</label>
					<input type="number" max="255" min="0" value="125" id="threshold" onchange="update_image()">
				</div>
				<div class="flex-group debug">
					<label for="mtusize">MTU</label>
					<input type="number" id="mtusize" value="20" min="0" max="255">
					<label for="interleavedcount">Interleaved count</label>
					<input type="number" id="interleavedcount" value="50" min="0" max="500">
				</div>
			</div>
			<div class="status-bar"><b>State: </b><span id="status"></span></div>
			<div class="flex-container">
				<div class="flex-group">
					<button id="clearcanvasbutton" type="button" class="secondary" onclick="clear_canvas()">Clear canvas</button>
					<button id="sendimgbutton" type="button" class="primary" onclick="sendimg()">Send picture</button>
				</div>
			</div>
			<canvas id="canvas" width="400" height="300"></canvas>
        </fieldset>
		<div class="footer">
			<span class="copy">&copy; 2025 tsl0922.</span>
			<span class="links">
				<a href="https://github.com/chacuavip10/EPD-nRF5">Github</a>
				<a href="https://qm.qq.com/q/SckzhfDxuu">Discussion Group</a>
				<a href="?debug=true" id="debug-toggle">Debug mode</a>
			</span>
		</div>
    </div>
    <script type="text/javascript" src="js/dithering.js?v=20250318"></script>
    <script type="text/javascript" src="js/main.js?v=20250412"></script>

</body>

</html>
